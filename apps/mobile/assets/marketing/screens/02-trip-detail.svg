  <g transform="translate(80 1850)" font-family="Georgia, serif">
    <text x="0" y="0" font-size="42" font-weight="500" fill="#1A1612">Public handoff guidance.</text>
    <text x="0" y="60" font-size="42" fill="#1A1612" fill-opacity="0.7">Caf&#233;, train station, your call.</text>
  </g>
  <g transform="translate(80 2640)" font-family="Georgia, serif">
    <text x="0" y="0" font-size="28" letter-spacing="6" fill="#3B2F22" fill-opacity="0.55">EUSHOP &#183; AGREED FEE PER SLOT</text>
