<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAF7F2"/>
      <stop offset="1" stop-color="#EFE5D2"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0" stop-color="#1A1612"/>
      <stop offset="1" stop-color="#3B2F22"/>
    </linearGradient>
  </defs>
  <rect width="1290" height="2796" fill="url(#bg)"/>
  <g transform="translate(80 220)" font-family="Georgia, serif">
    <text x="0" y="0" font-size="32" letter-spacing="6" fill="#3B2F22" fill-opacity="0.6">A TRIP IN PROGRESS</text>
    <text x="0" y="120" font-size="120" font-weight="600" fill="#1A1612">6 bag slots.</text>
    <text x="0" y="260" font-size="120" font-weight="600" fill="#1A1612">&#172;12 each.</text>
    <text x="0" y="370" font-size="42" fill="#1A1612" fill-opacity="0.7">Reserve a slot, message the bringer,</text>
    <text x="0" y="430" font-size="42" fill="#1A1612" fill-opacity="0.7">meet at the agreed handoff point.</text>
  </g>
  <g transform="translate(80 800)">
    <rect width="1130" height="900" rx="48" fill="#FFFFFF" stroke="#1A1612" stroke-opacity="0.08" stroke-width="2"/>
    <g transform="translate(80 100)">
      <circle cx="0" cy="50" r="42" fill="#B8860B"/>
      <text x="0" y="65" text-anchor="middle" font-size="40" font-family="Georgia, serif" fill="#FAF7F2" font-weight="600">M</text>
      <path d="M 60 50 Q 480 -100 970 50" fill="none" stroke="url(#route)" stroke-width="14" stroke-dasharray="22 14" stroke-linecap="round"/>
      <circle cx="970" cy="50" r="42" fill="#1A1612"/>
      <text x="970" y="65" text-anchor="middle" font-size="40" font-family="Georgia, serif" fill="#FAF7F2" font-weight="600">W</text>
    </g>
    <g transform="translate(80 280)" font-family="Georgia, serif">
      <text x="0" y="0" font-size="38" letter-spacing="3" fill="#9A9081">DEPARTS</text>
      <text x="0" y="64" font-size="64" font-weight="600" fill="#1A1612">Wed, May 14 &#183; 18:30</text>
      <text x="0" y="160" font-size="38" letter-spacing="3" fill="#9A9081">CARRIED BY</text>
      <text x="0" y="224" font-size="64" font-weight="600" fill="#1A1612">Marta &#183; 24 exchanges &#183; verified</text>
      <text x="0" y="320" font-size="38" letter-spacing="3" fill="#9A9081">SLOTS LEFT</text>
      <g transform="translate(0 360)">
        <rect width="120" height="120" rx="32" fill="#1A1612"/>
        <rect x="140" width="120" height="120" rx="32" fill="#1A1612"/>
        <rect x="280" width="120" height="120" rx="32" fill="#1A1612"/>
        <rect x="420" width="120" height="120" rx="32" fill="#1A1612"/>
        <rect x="560" width="120" height="120" rx="32" fill="#1A1612" fill-opacity="0.15"/>
        <rect x="700" width="120" height="120" rx="32" fill="#1A1612" fill-opacity="0.15"/>
      </g>
      <g transform="translate(0 540)">
        <rect width="600" height="100" rx="50" fill="#1A1612"/>
        <text x="300" y="65" text-anchor="middle" font-size="40" fill="#FAF7F2" font-weight="500">Reserve a slot</text>
