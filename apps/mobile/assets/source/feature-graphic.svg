<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" role="img" aria-label="Eushop Play Store feature graphic">
  <title>Eushop Play Store feature graphic</title>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF7F2"/>
      <stop offset="1" stop-color="#EFE5D2"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0" stop-color="#1A1612"/>
      <stop offset="1" stop-color="#3B2F22"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="500" fill="url(#paper)"/>
  <g opacity="0.08">
    <circle cx="160" cy="250" r="220" fill="#1A1612"/>
    <circle cx="900" cy="120" r="160" fill="#B8860B"/>
  </g>
  <g transform="translate(160 250)">
    <circle r="100" fill="none" stroke="#1A1612" stroke-opacity="0.18" stroke-width="3"/>
    <path d="M -80 18 C -40 -56, 40 56, 80 -18"
          fill="none"
          stroke="url(#route)"
          stroke-width="22"
          stroke-linecap="round"/>
    <circle cx="-80" cy="18" r="16" fill="#B8860B"/>
    <circle cx="-80" cy="18" r="7" fill="#FAF7F2"/>
    <circle cx="80" cy="-18" r="16" fill="#1A1612"/>
    <circle cx="80" cy="-18" r="7" fill="#FAF7F2"/>
  </g>
  <g font-family="Georgia, 'Times New Roman', serif" fill="#1A1612">
    <text x="320" y="200" font-size="64" font-weight="600">Eushop</text>
    <text x="320" y="260" font-size="32" font-weight="400" fill="#3B2F22">Get something from somewhere.</text>
    <text x="320" y="305" font-size="32" font-weight="400" fill="#3B2F22">Bring something for someone.</text>
    <text x="320" y="380" font-size="22" letter-spacing="2" fill="#1A1612" fill-opacity="0.55">TRIPS &#183; LOCALS &#183; OPEN ASKS</text>
  </g>
</svg>
