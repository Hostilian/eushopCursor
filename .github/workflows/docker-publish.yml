# Build and push API / web / admin images to GHCR. Run manually with a semver tag (e.g. 0.2.1).
name: Docker publish

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Image tag (e.g. 0.2.1 or latest)'
        required: true
        type: string
        default: 'latest'
      push:
        description: 'Push to ghcr.io (requires GITHUB_TOKEN write:packages)'
        required: false
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/eushop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/api.Dockerfile
          push: ${{ inputs.push }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ inputs.version_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/web.Dockerfile
          push: ${{ inputs.push }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:${{ inputs.version_tag }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=https://eushop.eu
            NEXT_PUBLIC_API_URL=https://api.eushop.eu
            NEXT_PUBLIC_PARTYKIT_HOST=https://party.eushop.eu
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build admin
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/admin.Dockerfile
          push: ${{ inputs.push }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-admin:${{ inputs.version_tag }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.eushop.eu
          cache-from: type=gha
          cache-to: type=gha,mode=max
