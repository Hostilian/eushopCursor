# Publishes `sites/gh-pages/` to GitHub Pages via the official Actions + artifact flow
# (not the legacy `gh-pages` git branch). Next.js `apps/web` stays standalone-hosted.
name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'sites/gh-pages/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Write Pages config
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          printf '%s\n' "{\"githubRepo\":\"https://github.com/${GITHUB_REPOSITORY}\"}" > sites/gh-pages/config.json

      # v3.0.1
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: sites/gh-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # v4.0.5
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
