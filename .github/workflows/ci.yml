name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: eushop
          POSTGRES_PASSWORD: eushop
          POSTGRES_DB: eushop
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U eushop"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://eushop:eushop@localhost:5432/eushop
      MEILI_HOST: http://localhost:7700
      MEILI_MASTER_KEY: ci
      BETTER_AUTH_SECRET: ci-only-not-secret-not-secret-not-secret
      BETTER_AUTH_URL: http://localhost:3001
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3001
      EXPO_PUBLIC_API_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - name: Detect picture-flow changes
        id: pictures_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            pictures:
              - 'apps/web/src/components/catalog/product-picker.tsx'
              - 'apps/mobile/src/components/ProductPicker.tsx'
              - 'packages/api-router/src/routers/catalog.ts'
              - 'packages/i18n/src/messages/**/*.json'
              - 'scripts/pictures-smoke-check.mjs'
              - 'package.json'
            csp_jsonld:
              - 'apps/web/src/app/(product)/items/[slug]/page.tsx'
              - 'apps/web/src/app/(product)/countries/[iso2]/page.tsx'
              - 'apps/web/src/middleware.ts'
              - 'scripts/csp-jsonld-smoke-check.mjs'
              - 'package.json'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-build-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-${{ github.ref_name }}
          restore-keys: |
            turbo-${{ runner.os }}-build-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-
            turbo-${{ runner.os }}-build-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Security audit dependencies
        run: pnpm audit --audit-level=high

      - name: Init Postgres extensions
        run: |
          PGPASSWORD=eushop psql -h localhost -U eushop -d eushop \
            -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp"; CREATE EXTENSION IF NOT EXISTS "pgcrypto"; CREATE EXTENSION IF NOT EXISTS "postgis"; CREATE EXTENSION IF NOT EXISTS "vector"; CREATE EXTENSION IF NOT EXISTS "pg_trgm"; CREATE EXTENSION IF NOT EXISTS "unaccent";'

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Readiness index integrity check
        run: pnpm readiness:index:check

      - name: Readiness status vocabulary check
        run: pnpm readiness:status:check

      - name: i18n key parity
        run: pnpm i18n:check

      - name: Product pictures smoke check
        if: github.event_name == 'push' || steps.pictures_changes.outputs.pictures == 'true'
        run: pnpm pictures:check

      - name: CSP JSON-LD nonce smoke check
        if: github.event_name == 'push' || steps.pictures_changes.outputs.csp_jsonld == 'true'
        run: pnpm csp:check

      - name: Claims overlap check
        run: pnpm claims:check

      - name: Unit tests
        run: pnpm test:unit

      - name: Build
        run: pnpm build

      - name: Migrate dry-run (validate Drizzle SQL against fresh Postgres)
        run: pnpm db:migrate

  e2e:
    name: Playwright smoke (web)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: eushop
          POSTGRES_PASSWORD: eushop
          POSTGRES_DB: eushop
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U eushop"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://eushop:eushop@localhost:5432/eushop
      MEILI_HOST: http://localhost:7700
      MEILI_MASTER_KEY: ci
      BETTER_AUTH_SECRET: ci-only-not-secret-not-secret-not-secret
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-e2e-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-${{ github.ref_name }}
          restore-keys: |
            turbo-${{ runner.os }}-e2e-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-
            turbo-${{ runner.os }}-e2e-
            turbo-${{ runner.os }}-build-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-
            turbo-${{ runner.os }}-build-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Init Postgres extensions
        run: |
          PGPASSWORD=eushop psql -h localhost -U eushop -d eushop \
            -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp"; CREATE EXTENSION IF NOT EXISTS "pgcrypto"; CREATE EXTENSION IF NOT EXISTS "postgis"; CREATE EXTENSION IF NOT EXISTS "vector"; CREATE EXTENSION IF NOT EXISTS "pg_trgm"; CREATE EXTENSION IF NOT EXISTS "unaccent";'

      - name: Migrate
        run: pnpm db:migrate

      - name: Build web
        run: pnpm --filter @eushop/web build

      - name: Install Playwright browsers
        run: pnpm --filter @eushop/web e2e:install

      - name: Playwright smoke
        run: pnpm --filter @eushop/web e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
