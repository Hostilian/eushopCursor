# Weekly dependency updates; CI on PRs validates the lockfile.
# Policy: merge grouped minor/patch PRs weekly; review major bumps individually
# (Next, Expo, Drizzle) and run `pnpm verify` before merge.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 8
    groups:
      tooling:
        patterns:
          - '@types/*'
          - 'eslint*'
          - 'prettier*'
          - 'typescript'
          - 'turbo'
          - 'vitest'
      react-ecosystem:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
          - 'next'
          - 'eslint-config-next'
      trpc-drizzle:
        patterns:
          - '@trpc/*'
          - 'drizzle-orm'
          - 'drizzle-kit'
